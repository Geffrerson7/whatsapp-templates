<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantillas WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0F1210",
              paper: "#F6F4EC",
              thread: "#D9D5C7",
              tick: "#00A884",
              brick: "#C1442E",
            },
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"],
              body: ['"IBM Plex Sans"', "sans-serif"],
              mono: ['"IBM Plex Mono"', "monospace"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-paper text-ink min-h-screen p-6">
    <h1 class="font-display text-3xl font-semibold text-center text-ink mb-1">
      Mis Plantillas
    </h1>
    <p class="text-center text-xs font-mono text-ink/50 mb-6 tracking-wide">
      crea · guarda · envía
    </p>

    <!-- Dos columnas: formulario a la izquierda, tarjetas a la derecha -->
    <div class="max-w-5xl mx-auto grid gap-6 md:grid-cols-[320px_1fr]">
      <!-- Columna izquierda: acciones (formulario + el generador) -->
      <div class="grid gap-6 self-start">
        <form
          id="form-plantilla"
          class="bg-white p-4 rounded-2xl border border-thread shadow-sm grid gap-2"
        >
          <input
            id="titulo"
            type="text"
            placeholder="Título"
            class="p-2 border border-thread rounded-lg bg-paper/50 placeholder:text-ink/40"
          />
          <input
            id="hashtag"
            type="text"
            placeholder="hashtag"
            class="p-2 border border-thread rounded-lg bg-paper/50 font-mono text-sm placeholder:text-ink/40"
          />
          <textarea
            id="mensaje"
            rows="3"
            placeholder="Mensaje (usa {nombre} y {producto})"
            class="p-2 border border-thread rounded-lg bg-paper/50 placeholder:text-ink/40"
          ></textarea>
          <button
            class="bg-tick text-white py-2 rounded-full font-medium hover:bg-tick/90 transition"
          >
            Agregar plantilla
          </button>
          <button
            type="button"
            id="btn-cancelar"
            class="px-4 py-2 border border-ink/20 text-ink rounded-full hover:bg-ink hover:text-paper transition hidden"
          >
            Cancelar
          </button>
        </form>
        <section
          id="generador"
          class="bg-white p-4 rounded-2xl border border-thread shadow-sm grid gap-3"
        >
          <h2 class="font-display font-semibold text-ink">✨ Usar plantilla</h2>

          <label class="grid gap-1 text-xs font-mono text-ink/50">
            Plantilla
            <select
              id="selector"
              class="p-2 border border-thread rounded-lg text-ink bg-paper/50"
            ></select>
          </label>

          <label class="grid gap-1 text-xs font-mono text-ink/50">
            Nombre real
            <input
              id="valorNombre"
              type="text"
              placeholder="ej. Ana"
              class="p-2 border border-thread rounded-lg text-ink bg-paper/50"
            />
          </label>

          <label class="grid gap-1 text-xs font-mono text-ink/50">
            Producto
            <input
              id="valorProducto"
              type="text"
              placeholder="ej. Laptop Gamer"
              class="p-2 border border-thread rounded-lg text-ink bg-paper/50"
            />
          </label>

          <button
            id="btn-generar"
            class="bg-ink hover:bg-ink/85 text-paper font-medium py-2 rounded-full transition"
          >
            Generar
          </button>

          <!-- Resultado: burbuja de chat con el mensaje final -->
          <div
            class="burbuja bg-white border border-thread p-3 grid gap-2 ml-1"
          >
            <p
              id="mensaje-final"
              class="text-sm text-ink whitespace-pre-wrap min-h-[1.5rem]"
            ></p>
            <button
              id="btn-copiar"
              class="justify-self-end text-xs font-mono text-tick hover:text-tick/80 flex items-center gap-1"
            >
              <span id="btn-copiar-texto">Copiar</span>
              <span id="btn-copiar-check">✓✓</span>
            </button>
          </div>
        </section>
      </div>

      <div class="grid gap-4 content-start">
        <div class="flex gap-2">
          <input
            id="buscador"
            type="text"
            placeholder="Filtra por hashtag…"
            class="flex-1 p-2 border border-thread rounded-full bg-white placeholder:text-ink/40"
          />

          <button
            id="btn-limpiar-filtro"
            type="button"
            class="group px-3 border border-thread rounded-full bg-white hover:bg-ink hover:text-paper hover:border-ink transition-all duration-200"
            title="Limpiar filtro"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon icon-tabler icons-tabler-outline icon-tabler-x transition-transform duration-200 group-hover:rotate-90 group-hover:scale-110"
            >
              <path stroke="none" d="M0 0h24v24H0z" fill="none" />
              <path d="M18 6l-12 12" />
              <path d="M6 6l12 12" />
            </svg>
          </button>
        </div>
        <select
          id="orden"
          class="w-full p-2 border border-thread rounded-full bg-white text-sm"
        >
          <option value="recientes">Más recientes</option>
          <option value="antiguas">Más antiguas</option>
          <option value="alfabetico">Título (A-Z)</option>
        </select>
        <aside
          id="panel-stats"
          class="bg-white border border-thread rounded-2xl p-3"
        ></aside>
        <ul id="listaPlantillas" class="grid gap-4 sm:grid-cols-2"></ul>
        <div
          class="flex items-center justify-between border-t border-thread pt-3 mt-1"
        >
          <p
            id="estado"
            class="text-xs font-mono text-ink/60 bg-white border border-thread px-2.5 py-1 rounded-full"
          >
            Listo
          </p>
          <button
            id="btn-vaciar"
            class="text-xs px-3 py-1.5 rounded-full border border-brick text-brick hover:bg-brick hover:text-white transition"
          >
            Vaciar todo
          </button>
        </div>
      </div>
    </div>

    <div
      id="modal"
      class="hidden fixed inset-0 z-50 bg-ink/60 flex items-center justify-center p-4"
    >
      <div
        class="bg-paper p-6 rounded-2xl border border-thread shadow-xl max-w-sm w-full text-center"
      >
        <p id="modal-texto" class="text-ink mb-5">¿Seguro?</p>
        <div class="flex gap-2 justify-center">
          <button
            id="modal-cancelar"
            class="px-4 py-2 rounded-full border border-ink/20 text-ink hover:bg-ink hover:text-paper transition"
          >
            Cancelar
          </button>
          <button
            id="modal-confirmar"
            class="px-4 py-2 rounded-full bg-brick text-white hover:bg-brick/85 transition"
          >
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <script src="js/models/Template.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
